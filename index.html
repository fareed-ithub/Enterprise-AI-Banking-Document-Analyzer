<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Banking Document Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cosmic-bg { 
            background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #0f172a 50%, #020617 100%); 
            position: relative; 
            overflow: hidden; 
            box-shadow: inset 0 0 50px rgba(59, 130, 246, 0.2);
        }
        .flow-particle { 
            position: absolute; width: 3px; height: 3px; background: rgba(255, 255, 255, 0.6); 
            border-radius: 50%; filter: blur(1px); animation: drift 15s infinite linear; 
        }
        @keyframes drift { 
            0% { transform: translateY(0) translateX(0); opacity: 0; } 
            50% { opacity: 1; }
            100% { transform: translateY(-200px) translateX(20px); opacity: 0; } 
        }
        .cosmic-glow { text-shadow: 0 0 10px rgba(96, 165, 250, 0.8), 0 0 20px rgba(96, 165, 250, 0.4); }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex bg-slate-950 text-slate-100 font-sans text-xs">

    <div class="flex w-full h-full">
        <!-- Control Deck -->
        <section class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full">
            <div class="p-4 border-b border-slate-800 font-bold uppercase tracking-wider text-xs flex items-center gap-2">
                <i class="fa-solid fa-building-columns text-blue-500"></i> Banking Control
            </div>
            <div class="p-4 flex flex-col gap-3">
                <input type="password" id="apiKeyInput" placeholder="Enter API Key" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white outline-none focus:ring-1 focus:ring-blue-500">
                <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition" onclick="setApiKey()">Set API Key</button>
            </div>
            <div class="p-4 border-t border-slate-800">
                <button class="w-full bg-slate-800 text-white py-2 rounded-lg font-medium hover:bg-slate-700 transition mb-3 disabled:opacity-50" id="connectBtn" onclick="initializeSystem()" disabled>Initialize System</button>
                <div id="statusIndicator" class="px-3 py-2 rounded-lg font-medium bg-slate-800 text-slate-400 flex items-center gap-2">
                    <i class="fa-solid fa-circle-nodes"></i> System: Offline
                </div>
            </div>
            <div class="p-4 mt-auto border-t border-slate-800">
                <button class="w-full bg-red-900/30 text-red-200 py-2 mb-4 rounded-lg font-medium hover:bg-red-900/50 transition" onclick="signOut()">Sign Out</button>
                <div id="dropzoneArea" class="border-2 border-dashed border-slate-800 rounded-xl p-4 text-center cursor-pointer hover:border-blue-500 transition" onclick="document.getElementById('fileInput').click()">
                    <p class="text-slate-400">Upload Banking Doc</p>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
            </div>
        </section>

        <!-- AI Assistant -->
        <section class="flex-1 flex flex-col h-full bg-slate-950 border-r border-slate-800">
            <div class="p-5 border-b border-slate-800 font-semibold uppercase text-slate-400">AI Assistant</div>
            <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4" id="chatMessages">
                <div class="message bot bg-slate-900 p-4 rounded-xl self-start max-w-[90%] border border-slate-800">Welcome. Please set your API key and initialize the system.</div>
            </div>
            <div class="p-6 border-t border-slate-800 bg-slate-900 flex gap-2">
                <input type="text" id="chatInput" class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-white focus:outline-none" placeholder="Ask questions..." onkeypress="handleKeyPress(event)" disabled>
                <button id="sendBtn" class="bg-blue-600 px-6 rounded-lg text-white font-medium hover:bg-blue-700 disabled:opacity-50" onclick="sendMessage()" disabled>Send</button>
            </div>
        </section>

        <!-- Sidebar Analytics -->
        <section class="w-72 bg-slate-900 h-full flex flex-col">
            <div class="cosmic-bg h-56 flex flex-col items-center justify-center border-b border-slate-800 relative">
                <div id="particles"></div>
                <h2 class="text-blue-200 font-bold z-10 text-xl tracking-[0.2em] cosmic-glow text-center">APEX NATIONAL BANK</h2>
                <p class="text-blue-400 z-10 mt-2 uppercase tracking-[0.3em]">Core Banking Solutions</p>
            </div>
            <div class="p-6 flex flex-col gap-6">
                <div class="bg-slate-950 p-4 rounded-lg border border-slate-800">
                    <div class="text-slate-500 uppercase mb-1 text-[10px]">Detected Document</div>
                    <div id="documentTitle" class="font-bold text-blue-400 truncate">None</div>
                    <div class="text-slate-500 uppercase mt-4 mb-1 text-[10px]">Document ID</div>
                    <div id="documentIdDisplay" class="font-mono text-emerald-400 text-sm">N/A</div>
                </div>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-slate-500 mb-1"><span>Risk Score</span><span id="riskValue">0%</span></div>
                        <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden"><div id="riskBar" class="h-full bg-blue-500 w-0 transition-all duration-1000"></div></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let documentContext = "", apiKey = "";
        
        // Initialize PDF.js worker to ensure reliable text extraction
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pContainer = document.getElementById('particles');
        for(let i=0; i<40; i++) {
            const p = document.createElement('div');
            p.className = 'flow-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.opacity = Math.random();
            pContainer.appendChild(p);
        }

        function setApiKey() {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            if(apiKey) {
                document.getElementById('connectBtn').disabled = false;
                appendMessage('bot', "API Key configured.");
            }
        }

        function initializeSystem() {
            const status = document.getElementById('statusIndicator');
            status.innerHTML = '<i class="fa-solid fa-check"></i> System: Online';
            status.className = "px-3 py-2 rounded-lg font-medium bg-green-900/20 text-green-400 flex items-center gap-2";
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            appendMessage('bot', "System initialized.");
        }

        function signOut() { location.reload(); }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            appendMessage('bot', `Reading document: ${file.name}...`);
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                documentContext = "";
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items.map(it => it.str).join(' ');
                    documentContext += pageText + "\n";
                }
                
                document.getElementById('documentTitle').textContent = file.name.substring(0,20).toUpperCase();
                
                if (documentContext.trim().length === 0) {
                    appendMessage('bot', `Warning: No readable text found. If this is a scanned image, the AI won't be able to read it.`);
                } else {
                    appendMessage('bot', `Document successfully processed (${documentContext.length} characters). Ready for analysis.`);
                }
            } catch (err) {
                appendMessage('bot', `Error reading document: ${err.message}`);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !apiKey) return;
            
            appendMessage('user', text);
            input.value = '';

            const botMsgElement = appendMessage('bot', 'Analyzing document...');

            const prompt = `You are a highly capable AI assistant for Apex National Bank.
Please analyze the following extracted text from an uploaded document to answer the user's query.

--- DOCUMENT TEXT ---
${documentContext}
--- END DOCUMENT TEXT ---

USER QUERY: "${text}"

INSTRUCTIONS:
1. Thoroughly search the document text for ANY information related to the user's query. Be flexible with wording (e.g., "Minimum Initial Deposit" might be written as "Min Deposit", "Initial Balance", etc.).
2. Answer the question in detail based ONLY on the provided text.
3. If the exact answer is missing but related context exists, provide the related context. Only state "Information not found" if there is absolutely nothing relevant.
4. Attempt to extract a Document Identifier (like an alphanumeric code, e.g., ANB-MASTER-REG-2026-X100) from the document header or text.
5. Return your response as pure raw JSON. Do NOT use markdown code blocks (\`\`\`json).

REQUIRED JSON FORMAT:
{
  "id": "extracted_id_or_N/A",
  "risk_score": 15,
  "answer": "Your detailed answer goes here."
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let textResp = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (textResp) {
                    // Clean markdown wrapping in case the AI ignores instructions
                    textResp = textResp.replace(/```json/gi, '').replace(/```/g, '').trim();
                    
                    try {
                        const res = JSON.parse(textResp);
                        streamText(botMsgElement, res.answer || "No answer provided.");
                        document.getElementById('riskValue').textContent = (res.risk_score || 0) + "%";
                        document.getElementById('riskBar').style.width = (res.risk_score || 0) + "%";
                        if(res.id && res.id !== "N/A" && res.id !== "None") {
                            document.getElementById('documentIdDisplay').textContent = res.id;
                        }
                    } catch (err) {
                        // Fallback if parsing fails
                        streamText(botMsgElement, textResp); 
                    }
                } else {
                    botMsgElement.textContent = "Error: The model did not return a valid response.";
                }
            } catch(e) {
                botMsgElement.textContent = "API connection failed. Please check your key or network.";
            }
        }

        function streamText(element, text) {
            element.textContent = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 15);
                }
            }
            type();
        }

        function appendMessage(role, text) {
            const chatMessages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `p-4 rounded-xl ${role === 'user' ? 'bg-blue-700' : 'bg-slate-800'}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
