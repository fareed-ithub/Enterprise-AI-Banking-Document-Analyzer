<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Banking Document Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-screen w-full overflow-hidden flex bg-slate-950 text-slate-100 font-sans">

    <div class="flex w-full h-full">
        <!-- Control Deck -->
        <section class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full">
            <div class="p-4 border-b border-slate-800 font-bold uppercase tracking-wider text-xs flex items-center gap-2">
                <i class="fa-solid fa-building-columns text-blue-500"></i> Banking Control
            </div>
            
            <div class="p-4 flex flex-col gap-3">
                <input type="password" id="apiKeyInput" placeholder="Enter API Key" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white outline-none focus:ring-1 focus:ring-blue-500">
                <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition text-xs" onclick="setApiKey()">Set API Key</button>
            </div>

            <div class="p-4 border-t border-slate-800">
                <button class="w-full bg-slate-800 text-white py-2 rounded-lg font-medium hover:bg-slate-700 transition text-xs mb-3 disabled:opacity-50" id="connectBtn" onclick="initializeSystem()" disabled>Initialize System</button>
                <div id="statusIndicator" class="px-3 py-2 rounded-lg text-xs font-medium bg-slate-800 text-slate-400 flex items-center gap-2">
                    <i class="fa-solid fa-circle-nodes"></i> System: Offline
                </div>
            </div>

            <div class="p-4 mt-auto border-t border-slate-800">
                <button class="w-full bg-red-900/30 text-red-200 py-2 mb-4 rounded-lg font-medium hover:bg-red-900/50 transition text-xs" onclick="signOut()">Sign Out</button>
                <div id="dropzoneArea" class="border-2 border-dashed border-slate-800 rounded-xl p-4 text-center cursor-pointer hover:border-blue-500 transition" onclick="document.getElementById('fileInput').click()">
                    <p class="text-[10px] text-slate-400">Upload Banking Doc</p>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
            </div>
        </section>

        <!-- AI Assistant -->
        <section class="flex-1 flex flex-col h-full bg-slate-950 border-r border-slate-800">
            <div class="p-5 border-b border-slate-800 font-semibold flex items-center gap-3 text-sm uppercase text-slate-400">AI Assistant</div>
            <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4" id="chatMessages">
                <div class="message bot bg-slate-900 p-4 rounded-xl self-start text-sm max-w-[90%] border border-slate-800">Welcome. Please set your API key and initialize the system.</div>
            </div>
            <div class="p-6 border-t border-slate-800 flex gap-3 bg-slate-900">
                <input type="text" id="chatInput" class="flex-1 bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Ask questions..." disabled>
            </div>
        </section>

        <!-- Analytics Dashboard -->
        <section class="w-72 bg-slate-900 h-full flex flex-col p-6">
            <div class="text-xs font-bold uppercase text-slate-400 mb-6">Document Insights</div>
            
            <div class="bg-slate-950 p-4 rounded-lg border border-slate-800 mb-6">
                <div class="text-[10px] text-slate-500 uppercase mb-1">Detected Document</div>
                <div id="documentTitle" class="text-sm font-bold text-blue-400">None</div>
            </div>

            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] uppercase text-slate-500 mb-2"><span>Risk Score</span><span id="riskValue">0%</span></div>
                    <div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden"><div id="riskBar" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] uppercase text-slate-500 mb-2"><span>Financial Health</span><span id="healthValue">0%</span></div>
                    <div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden"><div id="healthBar" class="h-full bg-green-500 transition-all duration-500" style="width: 0%"></div></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let documentContext = "", apiKey = "";

        document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function setApiKey() {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            if(apiKey) {
                document.getElementById('connectBtn').disabled = false;
                appendMessage('bot', "API Key set successfully.");
            }
        }

        function initializeSystem() {
            const status = document.getElementById('statusIndicator');
            status.innerHTML = '<i class="fa-solid fa-check"></i> System: Online';
            status.className = "px-3 py-2 rounded-lg text-xs font-medium bg-green-900/20 text-green-400 flex items-center gap-2";
            document.getElementById('chatInput').disabled = false;
            appendMessage('bot', "System initialized.");
        }

        function signOut() { location.reload(); }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('documentTitle').textContent = "Scanning...";
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) documentContext += (await (await pdf.getPage(i)).getTextContent()).items.map(it => it.str).join(' ');
            }
            
            // Extract Institution Name via AI
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Extract the main institution or company name from this text: "${documentContext.substring(0, 500)}". Respond with ONLY the name.` }] }] })
                });
                const data = await response.json();
                const title = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || file.name.split('.')[0];
                document.getElementById('documentTitle').textContent = title.toUpperCase();
            } catch {
                document.getElementById('documentTitle').textContent = file.name.split('.')[0].toUpperCase();
            }
            appendMessage('bot', `Document **${file.name}** is loaded.`);
        }

        function appendMessage(role, text) {
            const chatMessages = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = `p-4 rounded-xl text-sm ${role === 'user' ? 'bg-blue-700 self-end' : 'bg-slate-800 self-start'}`;
            chatMessages.appendChild(msg);
            msg.innerHTML = marked.parse(text);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msg;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            appendMessage('user', text);
            input.value = '';
            
            const botMsg = appendMessage('bot', '<i class="fa-solid fa-circle-notch fa-spin"></i> Thinking...');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Context: ${documentContext.substring(0,2000)}. Question: ${text}. Return JSON: {"risk_score": number, "health_score": number, "summary": "..."}` }] }] })
                });
                
                const data = await response.json();
                const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                const jsonMatch = raw.match(/\{[\s\S]*\}/);
                
                if (jsonMatch) {
                    const parsed = JSON.parse(jsonMatch[0]);
                    botMsg.innerHTML = "";
                    let i = 0;
                    const speed = 10;
                    function type() {
                        if (i < parsed.summary.length) {
                            botMsg.innerHTML = marked.parse(parsed.summary.substring(0, i + 1));
                            i++;
                            setTimeout(type, speed);
                        }
                    }
                    type();
                    document.getElementById('riskValue').textContent = parsed.risk_score + "%";
                    document.getElementById('riskBar').style.width = parsed.risk_score + "%";
                    document.getElementById('healthValue').textContent = parsed.health_score + "%";
                    document.getElementById('healthBar').style.width = parsed.health_score + "%";
                }
            } catch (e) { botMsg.innerHTML = "Error during analysis."; }
        }
    </script>
</body>
</html>
