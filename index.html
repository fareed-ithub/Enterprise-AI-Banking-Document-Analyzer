<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Banking Document Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen w-full overflow-hidden flex bg-slate-900 text-slate-100 font-sans">

    <div class="flex w-full h-full">
        <!-- Control Deck -->
        <section class="w-52 bg-slate-800 border-r border-slate-700 flex flex-col h-full">
            <div class="p-4 border-b border-slate-700 font-bold uppercase tracking-wider text-xs flex items-center gap-2">
                <i class="fa-solid fa-building-columns text-blue-500"></i> Banking Control
            </div>
            
            <div class="p-4 flex flex-col gap-3">
                <input type="password" id="apiKeyInput" placeholder="Enter API Key" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white outline-none focus:ring-1 focus:ring-blue-500">
                <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition text-xs" onclick="setApiKey()">Set API Key</button>
                <div id="apiStatus" class="px-3 py-2 rounded-lg text-xs font-medium bg-slate-700 text-slate-300 flex items-center gap-2">
                    <i class="fa-solid fa-key"></i> API: Not Ready
                </div>
            </div>

            <div class="p-4 flex flex-col gap-3 border-t border-slate-700">
                <button class="w-full bg-slate-700 text-white py-2 rounded-lg font-medium hover:bg-slate-600 transition text-xs disabled:opacity-50" id="connectBtn" onclick="initializeSystem()" disabled>
                    <i class="fa-solid fa-power-off mr-2"></i> Initialize
                </button>
                <div id="statusIndicator" class="px-3 py-2 rounded-lg text-xs font-medium bg-slate-700 text-slate-300 flex items-center gap-2">
                    <i class="fa-solid fa-circle-nodes"></i> System: Offline
                </div>
            </div>

            <div class="p-4 border-t border-slate-700 mt-auto">
                <div id="dropzoneArea" class="border-2 border-dashed border-slate-600 rounded-xl p-4 text-center cursor-pointer hover:border-blue-500 transition" onclick="document.getElementById('fileInput').click()">
                    <p class="text-[10px] text-slate-400">Upload Banking Doc</p>
                </div>
                <div id="fileBadge" class="hidden bg-slate-900 border border-slate-700 rounded-lg p-2 flex items-center justify-between">
                    <span id="fileName" class="text-[11px] truncate mr-2"></span>
                    <button onclick="removeFile()" class="text-slate-400 hover:text-red-400"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
            </div>
        </section>

        <!-- AI Assistant -->
        <section class="flex-1 flex flex-col h-full bg-slate-900">
            <div class="p-5 border-b border-slate-700 font-semibold flex items-center gap-3">
                <i class="fa-solid fa-shield-halved text-blue-400"></i> AI Banking Assistant
            </div>
            <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4" id="chatMessages">
                <div class="message bot bg-slate-800 p-4 rounded-xl self-start text-sm max-w-[80%]">System ready. Set your API Key and Initialize to begin.</div>
            </div>
            <div class="p-6 border-t border-slate-700 flex gap-3">
                <input type="text" id="chatInput" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ask questions..." disabled>
                <button class="bg-blue-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 disabled:opacity-50" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </section>
    </div>

    <script>
        let documentContext = "", systemReady = false, apiKey = "";

        // Add Enter Key Support
        document.getElementById('chatInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function setApiKey() {
            apiKey = document.getElementById('apiKeyInput').value.trim();
            if(apiKey) {
                document.getElementById('apiStatus').innerHTML = '<i class="fa-solid fa-check"></i> API: Ready';
                document.getElementById('apiStatus').className = "px-3 py-2 rounded-lg text-xs font-medium bg-green-900 text-green-300 flex items-center gap-2";
                document.getElementById('connectBtn').disabled = false;
            }
        }

        function initializeSystem() {
            systemReady = true;
            document.getElementById('statusIndicator').innerHTML = '<i class="fa-solid fa-check"></i> System: Online';
            document.getElementById('statusIndicator').className = "px-3 py-2 rounded-lg text-xs font-medium bg-green-900 text-green-300 flex items-center gap-2";
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
        }

        function removeFile() {
            documentContext = "";
            document.getElementById('dropzoneArea').classList.remove('hidden');
            document.getElementById('fileBadge').classList.add('hidden');
        }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('dropzoneArea').classList.add('hidden');
            document.getElementById('fileBadge').classList.remove('hidden');
            document.getElementById('fileName').textContent = file.name;
            try {
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'pdf') {
                    const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                    for (let i = 1; i <= pdf.numPages; i++) documentContext += (await (await pdf.getPage(i)).getTextContent()).items.map(it => it.str).join(' ');
                } else if (ext === 'docx') {
                    documentContext = (await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() })).value;
                }
                appendMessage('bot', `Document **${file.name}** processed.`);
            } catch (e) { appendMessage('bot', `Error: ${e.message}`); }
        }

        function appendMessage(role, text) {
            const chatMessages = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = `message ${role} p-4 rounded-xl max-w-[80%] ${role === 'user' ? 'bg-blue-600 self-end' : 'bg-slate-800 self-start'} text-sm`;
            msg.innerHTML = marked.parse(text);
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msg;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !apiKey) return;
            
            appendMessage('user', text);
            input.value = '';
            
            const botMsgDiv = appendMessage('bot', 'Thinking...');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({ contents: [{ parts: [{ text: documentContext ? `Context: ${documentContext.substring(0, 5000)}\n\nQuestion: ${text}` : text }] }] })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "API Error");
                
                const fullResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";
                
                // Clear the 'Thinking...' message
                botMsgDiv.innerHTML = "";
                
                // Smooth streaming line-by-line
                const sentences = fullResponse.match(/[^.!?]+[.!?]+/g) || [fullResponse];
                let displayedContent = "";
                
                for (let s of sentences) {
                    displayedContent += marked.parse(s) + " ";
                    botMsgDiv.innerHTML = displayedContent;
                    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                    await new Promise(r => setTimeout(r, 200));
                }
            } catch (e) {
                botMsgDiv.innerHTML = `Error: ${e.message}`;
            }
        }
    </script>
</body>
</html>
